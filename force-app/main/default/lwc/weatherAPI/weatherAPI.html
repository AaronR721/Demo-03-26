<template>
    <lightning-card title="Weather Lookup">
        <div class="slds-p-around_medium">
            <lightning-input
                label="City"
                value={city}
                onchange={handleCityChange}>
            </lightning-input>
            <lightning-input
                label="State"
                value={state}
                onchange={handleStateChange}
                class="slds-m-top_small">
            </lightning-input>
            <lightning-button
                label="Get Weather"
                onclick={handleGetWeather}
                class="slds-m-top_medium">
            </lightning-button>

            <template if:true={weatherData}>
                <div class="slds-m-top_medium">
                    <p><strong>Location:</strong> {weatherData.location.name}, {weatherData.location.region}, {weatherData.location.country}</p>
                    <p><strong>Temperature:</strong> {weatherData.current.temp_f}°F / {weatherData.current.temp_c}°C</p>
                    <p><strong>Condition:</strong> {weatherData.current.condition.text}</p>
                    <p><strong>Humidity:</strong> {weatherData.current.humidity}%</p>
                    <p><strong>Wind:</strong> {weatherData.current.wind_mph} mph</p>
                </div>
            </template>

            <template if:true={error}>
                <p class="slds-m-top_small slds-text-color_error">{error}</p>
            </template>
        </div>
    </lightning-card>
</template>
